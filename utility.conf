# Display lazygit
bind G display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Display btm (bottom system monitor)
bind B display-popup -w90% -h90% -E btm

# Display yazi (file manager)
bind Y display-popup -x R -h 80% -w 60% -E "sh -c 'SESSION_NAME=Yazi; if ! tmux has-session -t \$SESSION_NAME 2>/dev/null; then tmux new-session -d -s \$SESSION_NAME -c \"#{pane_current_path}\" yazi; tmux set-option -t \$SESSION_NAME status off; fi; tmux attach-session -t \$SESSION_NAME'"

# Open IDE mode (prefix w i)
bind w switch-client -T window_table
bind -T window_table i run-shell 'sh ~/.config/tmux/scripts/ide'
