set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -g status-position top
set -g status-left ""
set -g status-right ""

set -g focus-events on

set -g mouse on
set -g set-clipboard on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -ga terminal-overrides '*:Cs=\E]12;%p1%s\007:Cr=\E]112\007'

# Change leader key
set -g prefix '~'

# Unbind the default Ctrl-b prefix
unbind C-b

source ~/.config/tmux/binding.conf
source ~/.config/tmux/utility.conf

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'catppuccin/tmux'
source ~/.config/tmux/catppuccin.conf

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Must come AFTER TPM so plugins don't override it: ~ ~ sends a literal ~ to the pane
bind '~' send-prefix

